<!DOCTYPE html>
<head>
  <link rel="shortcut icon" href="https://pbs.twimg.com/profile_images/748825919192793088/qtFsAZKi_400x400.jpg">
  <title>#ACKATHON TDC</title>
</head>
<!-- multistep form -->
<form id="msform">
  <!-- progressbar -->
  <ul id="progressbar">
    <li class="active">Account Setup</li>
    <li>Social Profiles</li>
    <li>Personal Details</li>
  </ul>
  <!-- fieldsets --> 
  <fieldset>
    <h2 class="fs-title">Choose your weapons</h2>
    <h3 class="fs-subtitle">Well, sort of</h3>
    <input type="text" name="email" placeholder="Something@tdc.dk" />
    <input type="password" name="pass" placeholder="Password" />
    <input type="password" name="cpass" placeholder="Confirm Password" />
    <input type="button" name="next" class="next action-button" value="Next" />
  </fieldset>
  <fieldset>
    <h2 class="fs-title">New Phone who dis?</h2>
    <h3 class="fs-subtitle">Nah but seriously, who dis?</h3>
    <input type="text" name="Slack" placeholder="Slack" />
    <input type="text" name="Gibhub" placeholder="GibHub" />
    <input type="button" name="previous" class="previous action-button" value="Previous" />
    <input type="button" name="next" class="next action-button" value="Next" />
  </fieldset>
  <fieldset>
    <h2 class="fs-title">Name your character</h2>
    <h3 class="fs-subtitle">Kinda need the basics</h3>
    <input type="text" name="fname" placeholder="First Name" />
    <input type="text" name="lname" placeholder="Last Name" />
    <input type="button" name="previous" class="previous action-button" value="Previous" />
    <input type="submit" name="submit" class="submit action-button" value="Submit" />
  </fieldset>
</form>
